<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Kasir JE Grup" />
    <meta name="theme-color" content="#10b981" />
    <meta name="description" content="Sistem Manajemen Kasir & Stok — JS Clothing & JB Store" />
    <title>Kasir JE Grup</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="/icons/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <style>
      html,body{background:#030712;margin:0;padding:0}
      #root{min-height:100vh}
      #splash{position:fixed;inset:0;background:#030712;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .5s ease}
      #splash.hide{opacity:0;pointer-events:none}
      .sl{width:80px;height:80px;border-radius:22px;background:linear-gradient(135deg,rgba(16,185,129,.2),rgba(59,130,246,.2));border:1px solid rgba(16,185,129,.3);display:flex;align-items:center;justify-content:center;font-size:38px;margin-bottom:20px;box-shadow:0 0 60px rgba(16,185,129,.12)}
      .st{font-family:monospace;font-size:18px;font-weight:700;letter-spacing:3px;background:linear-gradient(90deg,#10b981,#3b82f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
      .ss{font-family:sans-serif;font-size:12px;color:#4e6a8a}
      .sd{display:flex;gap:6px;margin-top:24px}
      .sd span{width:6px;height:6px;border-radius:50%;background:#10b981;animation:sb .8s ease-in-out infinite}
      .sd span:nth-child(2){animation-delay:.15s}
      .sd span:nth-child(3){animation-delay:.3s}
      @keyframes sb{0%,100%{transform:scale(1);opacity:.5}50%{transform:scale(1.4);opacity:1}}
    </style>
  </head>
  <body>
    <div id="splash">
      <div class="sl">🏬</div>
      <div class="st">KASIR JE GRUP</div>
      <div class="ss">JS Clothing &nbsp;·&nbsp; JB Store</div>
      <div class="sd"><span></span><span></span><span></span></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      window.__hideSplash=function(){const s=document.getElementById('splash');if(s){s.classList.add('hide');setTimeout(()=>s.remove(),600)}};
      if('serviceWorker' in navigator){
        window.addEventListener('load',()=>{
          navigator.serviceWorker.register('/sw.js',{scope:'/'})
            .then(r=>console.log('[PWA] SW registered'))
            .catch(e=>console.warn('[PWA] SW failed:',e));
        });
      }
    </script>
  </body>
</html>
